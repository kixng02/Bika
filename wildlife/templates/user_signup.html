{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bika – Create Account</title>
  <link rel="stylesheet" href="{% static 'assets/bootstrap/css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
  <link rel="stylesheet" href="{% static 'assets/css/bika.css' %}">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <img class="logo-elephant" src="{% static 'assets/img/small_elephant_logo.png' %}" alt="Bika logo">
        <img class="logo-text" src="{% static 'assets/img/bika_small.png' %}" alt="Bika">
      </div>
      <h2>Create your account</h2>

      <form action="{% url 'wildlife:user_signup' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Email address</label>
          <input required class="form-control" type="email" name="email" placeholder="you@example.com" autofocus>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input required class="form-control" type="password" name="password" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Confirm password</label>
          <input required class="form-control" type="password" name="password_confirm" placeholder="••••••••">
        </div>
        <button class="btn-auth" type="submit">Create account</button>
      </form>

      <div class="auth-links">
        Already have an account? <a href="{% url 'wildlife:index' %}">Sign in</a>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="bika-alert error">{{ message }}</div>
        {% endfor %}
      {% endif %}
    </div>
  </div>
  <script src="{% static 'assets/bootstrap/js/bootstrap.min.js' %}"></script>
</body>
</html>
